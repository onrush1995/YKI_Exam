<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: clamp(24px, 6vw, 64px);
    }

    main {
      display: grid;
      gap: clamp(22px, 5vw, 40px);
      justify-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 15vw, 172px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.9;
    }

    a {
      color: inherit;
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Kiitos, Suomi</h1>
    <a href="index.html#home">Home</a>
  </main>
</body>
</html>
